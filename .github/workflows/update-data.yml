name: Refresh stations.json from CA Open Data

on:
  schedule:
    - cron: '0 8 * * *'   # 8 AM UTC ≈ midnight PT, daily
  workflow_dispatch:        # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # build_data.py uses only the Python standard library — no pip install needed.
      - name: Build docs/stations.json
        run: python3 build_data.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/stations.json
          if git diff --cached --quiet; then
            echo "No changes to stations.json"
          else
            git commit -m "Refresh stations.json from CA Open Data [skip ci]"
            git push
          fi
